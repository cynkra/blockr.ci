# Centralised CI pipeline for blockr.* packages
#
# Usage — consumer repo .github/workflows/ci.yaml:
#
#   on:
#     push:
#       branches: main
#     pull_request:
#     merge_group:
#
#   name: ci
#
#   jobs:
#     ci:
#       uses: cynkra/blockr.ci/.github/workflows/ci.yaml@main
#       with:
#         revdep-packages: |
#           BristolMyersSquibb/blockr.dock
#       secrets: inherit
#       permissions:
#         contents: write

on:
  push:
    branches: main
  pull_request:
  merge_group:
  workflow_call:
    inputs:

      revdep-packages:
        description: >
          Newline-separated list of downstream packages to reverse-dependency
          check.  Omit or leave empty to skip the revdep job.
        type: string
        default: ''
        required: false

      lintr-exclusions:
        description: >
          Newline-separated file paths to exclude from linting.
        type: string
        default: ''
        required: false

      skip-pkgdown:
        description: >
          Set to true to skip the pkgdown job.  Useful for packages that
          build their site differently (e.g. Quarto).
        type: boolean
        default: false
        required: false

name: ci

jobs:

  # ── Lint ──────────────────────────────────────────────────────────────

  lint:

    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.BLOCKR_PAT || github.token }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: cynkra/blockr.ci/.github/actions/parse-deps@main
        id: deps
        with:
          pr-body: ${{ github.event.pull_request.body }}
          pr-number: ${{ github.event.pull_request.number }}
          base-packages: |
            any::lintr
            local::.

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: ${{ steps.deps.outputs.extra-packages }}
          needs: lint

      - name: Write lintr config
        if: ${{ hashFiles('.lintr') == '' }}
        env:
          LINTR_EXCLUSIONS: ${{ inputs.lintr-exclusions }}
        shell: Rscript {0}
        run: |
          excl <- Sys.getenv("LINTR_EXCLUSIONS")
          paths <- if (nzchar(excl)) trimws(strsplit(excl, "[,\n]")[[1]]) else character()
          paths <- paths[nzchar(paths)]

          cfg <- "linters: linters_with_defaults(\n  object_name_linter = NULL\n  )"
          if (length(paths)) {
            items <- paste0('  "', paths, '"', collapse = ",\n")
            cfg <- paste0(cfg, "\nexclusions: list(\n", items, "\n  )")
          }
          writeLines(cfg, ".lintr")

      - name: Lint
        run: lintr::lint_package()
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: true

  # ── Smoke test (single-platform quick check, PR gate) ────────────────

  smoke:

    needs: lint

    runs-on: ubuntu-latest

    outputs:
      revdep-packages: ${{ steps.revdep-matrix.outputs.packages }}
      has-revdep-packages: ${{ steps.revdep-matrix.outputs.has-packages }}

    env:
      GITHUB_PAT: ${{ secrets.BLOCKR_PAT || github.token }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: cynkra/blockr.ci/.github/actions/parse-deps@main
        id: deps
        with:
          pr-body: ${{ github.event.pull_request.body }}
          pr-number: ${{ github.event.pull_request.number }}
          base-packages: |
            any::rcmdcheck
            local::.

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: ${{ steps.deps.outputs.extra-packages }}
          needs: check

      - name: Remove mermaid config for CI
        run: Rscript -e 'unlink("vignettes/_metadata.yml")'

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true

      - name: Build revdep matrix
        id: revdep-matrix
        env:
          INPUT: ${{ inputs.revdep-packages }}
        run: |
          pkgs=$(echo "$INPUT" | tr -d '\r' | sed '/^[[:space:]]*$/d' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          json=$(echo "$pkgs" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "packages=${json}" >> "$GITHUB_OUTPUT"
          if [ "$json" = "[]" ]; then
            echo "has-packages=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-packages=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Full R CMD check (multi-platform, merge queue + push) ─────────────

  check:

    needs: smoke

    if: github.event_name != 'pull_request'

    runs-on: ${{ matrix.config.os }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.BLOCKR_PAT || github.token }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: cynkra/blockr.ci/.github/actions/parse-deps@main
        id: deps
        with:
          pr-body: ${{ github.event.pull_request.body }}
          pr-number: ${{ github.event.pull_request.number }}
          base-packages: |
            any::rcmdcheck
            local::.

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: ${{ steps.deps.outputs.extra-packages }}
          needs: check

      - name: Remove mermaid config for CI
        run: Rscript -e 'unlink("vignettes/_metadata.yml")'

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true

  # ── Test coverage ────────────────────────────────────────────────────

  coverage:

    needs: smoke

    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.BLOCKR_PAT || github.token }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: cynkra/blockr.ci/.github/actions/parse-deps@main
        id: deps
        with:
          pr-body: ${{ github.event.pull_request.body }}
          pr-number: ${{ github.event.pull_request.number }}
          base-packages: |
            any::covr

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: ${{ steps.deps.outputs.extra-packages }}
          needs: coverage

      - name: Test coverage
        run: |
          covr::codecov(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(Sys.getenv("RUNNER_TEMP"), "package")
          )
        shell: Rscript {0}

      - name: Show testthat output
        if: always()
        run: |
          find ${{ runner.temp }}/package -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package

  # ── Reverse-dependency checks ────────────────────────────────────────

  revdep:

    needs: smoke

    if: >-
      needs.smoke.outputs.has-revdep-packages == 'true' &&
      github.event_name == 'pull_request'

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        pkg: ${{ fromJson(needs.smoke.outputs.revdep-packages) }}

    env:
      GITHUB_PAT: ${{ secrets.BLOCKR_PAT || github.token }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4
        with:
          path: pkg

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: cynkra/blockr.ci/.github/actions/parse-deps@main
        id: deps
        with:
          pr-body: ${{ github.event.pull_request.body }}
          pr-number: ${{ github.event.pull_request.number }}
          pkg: ${{ matrix.pkg }}
          base-packages: |
            any::rcmdcheck
            local::../pkg

      - uses: actions/checkout@v4
        with:
          repository: ${{ matrix.pkg }}
          ref: ${{ steps.deps.outputs.ref }}
          token: ${{ secrets.BLOCKR_PAT || github.token }}
          path: revdep

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: quarto-dev/quarto-actions/setup@v2

      # Two-pass install lets pkg's and revdep's Remotes both get followed
      # while keeping their dependency closures separate. Walking pkg's deps
      # at top level (e.g. via `deps::pkg` with default `dependencies = "all"`)
      # would also pull in pkg's Suggests and the Suggests of their transitive
      # deps — observed to leak `uuid` (via blockr.core's Suggests on `ids`)
      # into the install, which flips httpuv/shiny to non-deterministic
      # session nonces and breaks unrelated snapshot tests in the revdep.
      #
      # Pass 1: install pkg's hard deps (no Suggests) with pkg's Remotes
      # resolved.
      - name: Install pkg hard deps with Remotes resolved
        shell: bash
        run: |
          # Use the already-installed pkgdepends (placed by parse-deps) rather
          # than installing pak fresh. This avoids leaving an extra package in
          # libPaths position [1] for the test run, which has been observed
          # to perturb shiny session state in unrelated snapshot tests.
          Rscript -e '
            prop <- pkgdepends::new_pkg_installation_proposal(
              c("deps::pkg", "local::pkg"),
              config = list(dependencies = "hard")
            )
            prop$solve()
            prop$download()
            prop$install()
          '

      # Pass 2: install revdep's full deps with revdep's Remotes followed via
      # working-directory. `dependencies: c("all", "hard")` walks Suggests for
      # direct refs (so the test runner gets testthat / shinytest2 / etc.) but
      # only hard deps for transitives — so e.g. blockr.core's Suggests don't
      # expand into ids -> uuid. (`NA` here doesn't have the desired effect:
      # pkgdepends treats it as "soft" applied to both direct and indirect.)
      # Hard deps already installed in pass 1 are reused.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: ${{ steps.deps.outputs.extra-packages }}
          working-directory: revdep
          dependencies: 'c("all", "hard")'
          # Bumped to invalidate caches built before the two-pass install
          # landed — those caches contain Suggests-tree leftovers (e.g. `uuid`)
          # that pak's resolver no longer pulls in but doesn't remove either.
          cache-version: 2

      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: revdep
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'

  # ── pkgdown site ─────────────────────────────────────────────────────

  pkgdown:

    needs: smoke

    if: >-
      !inputs.skip-pkgdown &&
      github.event_name != 'pull_request'

    runs-on: ubuntu-latest

    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}

    env:
      GITHUB_PAT: ${{ secrets.BLOCKR_PAT || github.token }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: cynkra/blockr.ci/.github/actions/parse-deps@main
        id: deps
        with:
          pr-body: ${{ github.event.pull_request.body }}
          pr-number: ${{ github.event.pull_request.number }}
          base-packages: |
            any::pkgdown
            local::.

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: ${{ steps.deps.outputs.extra-packages }}
          needs: website

      - name: Remove mermaid config for CI
        run: Rscript -e 'unlink("vignettes/_metadata.yml")'

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages
        if: github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4.4.1
        with:
          clean: false
          branch: gh-pages
          folder: docs
