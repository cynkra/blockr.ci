name: Parse deps block
description: >
  Parses the ```deps block from a PR body and outputs an extra-packages
  list for setup-r-dependencies plus (optionally) a git ref for a
  specific package.

inputs:
  pr-body:
    description: >
      The pull request body text.  When pr-number is also set the action
      fetches the latest body from the API (avoids stale webhook payloads)
      and falls back to this value on error.
    required: true
  pr-number:
    description: >
      PR number (e.g. github.event.pull_request.number).  When set, the
      action fetches the latest body from the GitHub API to avoid race
      conditions between push and body-edit events.
    required: false
    default: ''
  pkg:
    description: >
      If set, also extract the git ref for this specific package
      (owner/repo). Used by the revdep workflow.
    required: false
    default: ''
  base-packages:
    description: >
      Newline-separated pak refs that form the extra-packages output.
      Defaults to any::rcmdcheck. Deps-block entries are validated but
      never appended here — they only feed the `ref` output.
    required: false
    default: any::rcmdcheck

outputs:
  extra-packages:
    description: Newline-separated pak refs for setup-r-dependencies.
    value: ${{ steps.parse.outputs.extra-packages }}
  ref:
    description: Git ref for the requested package, empty if not found.
    value: ${{ steps.parse.outputs.ref }}

runs:
  using: composite
  steps:
    - name: Ensure pkgdepends
      shell: bash
      run: |
        Rscript -e 'if (!requireNamespace("pkgdepends", quietly = TRUE)) install.packages("pkgdepends")'

    - name: Parse
      id: parse
      shell: bash
      env:
        PR_BODY: ${{ inputs.pr-body }}
        PR_NUMBER: ${{ inputs.pr-number }}
        GH_TOKEN: ${{ github.token }}
        PKG: ${{ inputs.pkg }}
        BASE_PACKAGES: ${{ inputs.base-packages }}
        SCRIPT_DIR: ${{ github.action_path }}
      run: bash "$SCRIPT_DIR/parse-deps.sh"
